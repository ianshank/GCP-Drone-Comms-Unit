[mypy]
python_version = 3.10
strict = True
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_decorators = True
mypy_path = packages/meshsa/src

# Optional/third-party deps without type stubs. Kept in sync with the
# [[tool.mypy.overrides]] list in packages/meshsa/pyproject.toml so the repo-root
# config (used to type-check flightctl/) accepts the same stubless imports the
# package config does (e.g. flightctl/run_commander.py imports pymavlink + aiohttp).
[mypy-meshtastic.*]
ignore_missing_imports = True

[mypy-pubsub.*]
ignore_missing_imports = True

[mypy-pypubsub.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-pymavlink.*]
ignore_missing_imports = True

[mypy-yamspy.*]
ignore_missing_imports = True

[mypy-serial.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-rasterio.*]
ignore_missing_imports = True
[mypy-tests.*]
disallow_untyped_defs = False

[mypy-meshsa.examples.*]
disallow_untyped_defs = False