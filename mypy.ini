[mypy]
python_version = 3.10
strict = True
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_decorators = True
mypy_path = packages/meshsa/src

[mypy-meshtastic.*]
ignore_missing_imports = True

[mypy-pubsub.*]
ignore_missing_imports = True

[mypy-pypubsub.*]
ignore_missing_imports = True

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-meshsa.examples.*]
disallow_untyped_defs = False