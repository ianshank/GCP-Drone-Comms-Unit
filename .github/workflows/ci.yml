name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/meshsa[dev]"

      - name: Lint
        run: ruff check packages/meshsa

      - name: Format check
        run: ruff format --check packages/meshsa

      - name: Type check
        working-directory: packages/meshsa
        run: mypy src

      - name: Test
        working-directory: packages/meshsa
        run: pytest

      - name: Build sdist + wheel
        working-directory: packages/meshsa
        run: |
          pip install build
          python -m build
