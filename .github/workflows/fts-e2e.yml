name: fts-e2e

# Dispatch-only, hardware-deferred FreeTAKServer end-to-end check. Targets a
# self-hosted Jetson runner that does not exist yet (Task 15, Step 6): this
# ships the harness, and the on-hardware run is the deferred validation step.
# Never runs on PRs/schedule and never affects the meshsa coverage gate.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fts-e2e:
    runs-on: [self-hosted, jetson, arm64] # requires a registered Jetson runner (not yet provisioned)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install meshsa + extras
        run: python -m pip install -e "packages/meshsa[dev,health]"

      - name: Bring up FreeTAKServer
        run: |
          bash flightctl/scripts/setup_fts.sh
          set -a; source /etc/flightctl/fts.env; set +a
          nohup /mnt/ssd/venvs/fts/bin/python -m FreeTAKServer.controllers.services.FTS >/tmp/fts.log 2>&1 &
          for i in $(seq 1 30); do nc -z 127.0.0.1 8087 && break; sleep 1; done

      - name: Run FTS e2e
        env:
          MESHSA_FTS_E2E: "1"
        run: cd packages/meshsa && python -m pytest tests/e2e/test_fts_e2e.py -m e2e --no-cov -q

      - name: Teardown FTS
        if: always()
        run: pkill -9 -f FreeTAKServer || true
