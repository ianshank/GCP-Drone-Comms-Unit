name: nightly

# Scheduled deeper run that the per-PR `ci` workflow intentionally skips:
#   * installs the FULL optional dependency graph ([dev,meshtastic,health]) so
#     mypy/tests run against the real meshtastic/pypubsub/aiohttp types — this
#     catches optional-dependency typing drift the [dev]-only CI cannot see.
#   * runs any @pytest.mark.slow soak/fuzz tests; Hypothesis explores fresh
#     randomized inputs on each nightly run.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (full extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/meshsa[dev,meshtastic,health]"

      - name: Type check with optional deps present
        working-directory: packages/meshsa
        run: mypy src

      - name: Full suite + slow soak tests
        working-directory: packages/meshsa
        run: pytest -m "slow or not slow"
