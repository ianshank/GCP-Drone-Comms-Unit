[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "meshsa"
version = "0.3.0"
description = "Modular framework for a distributable mesh situational-awareness network"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "GCP-Drone-Comms-Unit contributors" }]
keywords = ["mesh", "situational-awareness", "meshtastic", "tak", "atak", "lora"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Ham Radio",
    "Topic :: System :: Networking",
]
dependencies = [
    "pydantic>=2,<3",
    "structlog>=23,<26",
]

[project.optional-dependencies]
meshtastic = [
    "meshtastic>=2.3",
    "pypubsub>=4.0",
]
tak = []
mavlink = [
    "pymavlink>=2.4",
]
msp = [
    "yamspy>=0.3",
]
inference = [
    "aiohttp>=3.9",
]
health = [
    "aiohttp>=3.9",
]
fpv = [
    "pyserial>=3.5",
    "pyarrow>=15",
]
camera = [
    "opencv-python-headless>=4.8",
]
llm = [
    "anthropic>=0.40",
    "aiohttp>=3.9",
]
# Vineyard scouting (meshsa.scout): DEM terrain (rasterio) + the aiohttp station.
# rasterio is used only by the DEM loader (pragma'd I/O glue); the interpolation
# math is pure and needs no extra, so the test suite runs green under [dev] alone.
geo = [
    "rasterio>=1.3",
]
scout = [
    "aiohttp>=3.9",
    "meshsa[geo]",  # reuse the geo (rasterio DEM) stack rather than re-pinning it
]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23",
    "hypothesis>=6",
    # aiohttp is needed by the test suite (AiohttpTransport + the _require_aiohttp
    # success path), so `[dev]` alone can run the full suite without `[inference]`.
    "aiohttp>=3.9",
    "ruff>=0.6",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "build>=1.2",
    "twine>=5",
]

[project.scripts]
meshsa-base = "meshsa.cli:main"
fpv-telemetry-monitor = "meshsa.fpv.tools.monitor:main"
fpv-log-replay = "meshsa.fpv.tools.replay:main"
fpv-log-convert = "meshsa.fpv.tools.convert:main"
meshsa-llm = "meshsa.llm.server:main"
meshsa-scout = "meshsa.scout.cli:main"

[project.urls]
Homepage = "https://github.com/ianshank/GCP-Drone-Comms-Unit"
Source = "https://github.com/ianshank/GCP-Drone-Comms-Unit"
Issues = "https://github.com/ianshank/GCP-Drone-Comms-Unit/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
meshsa = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=meshsa --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]
# Make flightctl/ (the live service glue, outside the package) importable for its
# glue tests without per-file sys.path mutation. Relative to this rootdir.
pythonpath = ["../../flightctl"]
markers = [
    "slow: long-running soak/fuzz tests; exercised by the nightly workflow",
    "e2e: end-to-end tests needing a live FreeTAKServer; opt-in via MESHSA_FTS_E2E=1 (never in the coverage gate)",
]

[tool.coverage.run]
source = ["meshsa"]
branch = true
omit = ["*/meshsa/examples/*"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]
"examples/**" = ["B008"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_decorators = true

[[tool.mypy.overrides]]
module = [
    "meshtastic.*",
    "pubsub.*",
    "pypubsub.*",
    "aiohttp.*",
    "pymavlink.*",
    "yamspy.*",
    "serial.*",
    "pyarrow.*",
    "cv2.*",
    "anthropic.*",
    "rasterio.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "meshsa.examples.*"]
disallow_untyped_defs = false
