[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "meshsa"
version = "0.1.0"
description = "Modular framework for a distributable mesh situational-awareness network"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "jetson-flight-control contributors" }]
keywords = ["mesh", "situational-awareness", "meshtastic", "tak", "atak", "lora"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Ham Radio",
    "Topic :: System :: Networking",
]
dependencies = [
    "pydantic>=2,<3",
    "structlog>=23,<26",
]

[project.optional-dependencies]
meshtastic = [
    "meshtastic>=2.3",
    "pypubsub>=4.0",
]
tak = []
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "build>=1.2",
    "twine>=5",
]

[project.scripts]
meshsa-base = "meshsa.examples.base_node:main"

[project.urls]
Homepage = "https://github.com/your-org/jetson-flight-control"
Source = "https://github.com/your-org/jetson-flight-control"
Issues = "https://github.com/your-org/jetson-flight-control/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
meshsa = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=meshsa --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]

[tool.coverage.run]
source = ["meshsa"]
branch = true
omit = ["*/meshsa/examples/*"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]
"examples/**" = ["B008"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_decorators = true

[[tool.mypy.overrides]]
module = ["meshtastic.*", "pubsub.*", "pypubsub.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "meshsa.examples.*"]
disallow_untyped_defs = false
