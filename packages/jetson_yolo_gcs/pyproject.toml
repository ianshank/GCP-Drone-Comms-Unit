[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jetson-yolo-gcs"
version = "0.1.0"
description = "Jetson on-board perception: YOLO detection -> GCS video stream + MAVLink LANDING_TARGET"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "GCP-Drone-Comms-Unit contributors" }]
keywords = ["jetson", "yolo", "ultralytics", "hailo", "gstreamer", "mavlink", "landing-target"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Image Recognition",
    "Topic :: Multimedia :: Video :: Capture",
]
dependencies = [
    "pydantic>=2,<3",
    "pydantic-settings>=2,<3",
    "structlog>=23,<26",
]

[project.optional-dependencies]
ultralytics = [
    "ultralytics>=8.2",
]
hailo = []
camera = [
    "opencv-python-headless>=4.8",
]
mavlink = [
    "pymavlink>=2.4",
]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "build>=1.2",
    "twine>=5",
]

[project.scripts]
jetson-yolo-gcs = "jetson_yolo_gcs.cli:main"

[project.urls]
Homepage = "https://github.com/ianshank/GCP-Drone-Comms-Unit"
Source = "https://github.com/ianshank/GCP-Drone-Comms-Unit"
Issues = "https://github.com/ianshank/GCP-Drone-Comms-Unit/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
jetson_yolo_gcs = ["py.typed"]

[tool.pytest.ini_options]
addopts = "--cov=jetson_yolo_gcs --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]

[tool.coverage.run]
source = ["jetson_yolo_gcs"]
branch = true

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_decorators = true

[[tool.mypy.overrides]]
module = [
    "ultralytics.*",
    "hailo_platform.*",
    "pymavlink.*",
    "cv2.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
